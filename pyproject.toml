[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["venv", "build", "dist", "frontend"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]
ignore = [
    "E501",  # line-too-long (formatter handles)
    "B008",  # function-call-in-default-argument (FastAPI Depends pattern)
    "UP042", # StrEnum migration (subtle __str__ change, deferred)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts in tests are fine
"bot/db/queries.py" = ["E501"]  # SQL constants

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
